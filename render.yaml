# Render blueprint — deploy with "New + → Blueprint" at dashboard.render.com
# Free tier: no disk, so QuickBooks tokens persist in Supabase (see DEPLOY.md).
# Trade-off: the service sleeps after ~15 idle minutes; first open takes ~1 min.
services:
  - type: web
    name: qbo-timesheet
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --proxy-headers --forwarded-allow-ips '*'
    autoDeploy: true
    envVars:
      - key: QBO_ENVIRONMENT
        value: sandbox          # flip to "production" after Intuit grants prod keys
      - key: QBO_CLIENT_ID
        sync: false             # set in the Render dashboard
      - key: QBO_CLIENT_SECRET
        sync: false
      - key: QBO_REDIRECT_URI
        sync: false             # https://<your-app>.onrender.com/callback
      - key: APP_PASSWORD
        sync: false             # pick a good password — this gates the whole app
      - key: SUPABASE_URL
        sync: false             # from Supabase → Settings → API → Project URL
      - key: SUPABASE_SERVICE_KEY
        sync: false             # from Supabase → Settings → API → service_role key
